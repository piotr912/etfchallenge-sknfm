function updateProgress(done) {
  var pw = document.getElementById('progress-wrap');
  if (done < 0) { pw.style.display='none'; return; }
  pw.style.display = 'block';
  document.getElementById('progress-fill').style.width = Math.round(done/CHAPTER_COUNT*100)+'%';
  document.getElementById('prog-right').textContent = done+' / '+CHAPTER_COUNT+' rozdziałów';
}

function getShuffled(idx) {
  if (!chapterShuffledChoices[idx]) {
    var arr = chapters[idx].choices.map(function(c,i){return{c:c,i:i};});
    var s = (idx+1)*1664525+1013904223;
    function r(){s=(s*1664525+1013904223)&0x7fffffff;return s/0x7fffffff;}
    for(var i=arr.length-1;i>0;i--){var j=Math.floor(r()*(i+1));var t=arr[i];arr[i]=arr[j];arr[j]=t;}
    chapterShuffledChoices[idx]=arr;
  }
  return chapterShuffledChoices[idx];
}

  }

    '<div class="game-title"><div style="font-size:40px;margin-bottom:4px;">📈</div><h1>Jak inwestować w ETF</h1><p style="font-size:13px;color:#555;margin-top:4px;">Interaktywny przewodnik po świecie funduszy ETF</p><div class="badge-row"><span class="badge">6 rozdziałów</span><span class="badge">moduł — polityka dywidendowa</span><span class="badge">dla początkujących</span><span class="badge">SKN Finansów i Makroekonomii</span></div></div>'
    +'<div class="comic-panel"><div class="panel-header">⚡ Prolog</div><div class="panel-scene">'+sc+'</div>'+bot+'</div>';
}
function advanceProlog(){if(prologStep<2){prologStep++;renderPrologStep();}}

function selectHero(h){
  hero=h; heroEmoji=h==='adam'?'👨‍💼':'👩‍💼';
  portfolio=1000000;score=0;answers={};earnedBadges={};chapterSceneStep={};chapterShuffledChoices={};
  document.getElementById('hero-label').textContent=(h==='adam'?'👨‍💼 Adam':'👩‍💼 Ewa');
  renderChapter(0);
}

function renderChapter(idx){
  if(chapterSceneStep[idx]===undefined) chapterSceneStep[idx]=0;
  var ch=chapters[idx];
  var hn=hero==='adam'?'Adam':'Ewa';
  var answered=answers[idx]!==undefined;
  document.getElementById('score-bar').style.display='block';
  document.getElementById('chapter-label').textContent='Rozdział '+(idx+1)+'/'+CHAPTER_COUNT;
  document.getElementById('portfolio-val').textContent=portfolio.toLocaleString('pl-PL')+' zł';
  updateProgress(idx);

  var steps=ch.sceneSteps(hn,heroEmoji);
  var step=answered?steps.length-1:chapterSceneStep[idx];
  var sc=''; for(var s=0;s<=step;s++) sc+=steps[s];

  var shuffled=getShuffled(idx);
  var bot='';
  if(!answered && step<steps.length-1){
    bot='<div class="choices"><button class="continue-btn" onclick="advScene('+idx+')">Dalej ➡️</button>'
      +(idx>0?'<button class="back-btn" onclick="goBack('+idx+')">← Poprzedni rozdział</button>':'<button class="back-btn" onclick="renderTitle()">← Wybór bohatera</button>')
      +'</div>';
  } else {
    var chtml=shuffled.map(function(item){
      var st='';
      if(answered&&answers[idx]===item.i) st=item.c.correct?'background:#EAF3DE;border-color:#639922;color:#173404;':'background:#FCEBEB;border-color:#E24B4A;color:#501313;';
      return '<button class="choice-btn" onclick="doAnswer('+idx+','+item.i+')" '+(answered?'disabled':'')+' style="'+st+'">'+item.c.text+'</button>';
    }).join('');
    var fb='';
    if(answered){
      var ch2=ch.choices[answers[idx]];
      fb='<div class="'+(ch2.correct?'success-box':'danger-box')+'">'+(ch2.correct?'✅ <strong>Świetnie!</strong> ':'❌ <strong>Nie tym razem!</strong> ')+ch2.explanation+(ch2.correct?'<br><strong>+50 000 zł do portfela!</strong>':'<br><em>-20 000 zł... ale wiedza bezcenna!</em>')+'</div>';
    }
    var nav='';
    if(answered){
      var isLast=idx===chapters.length-1;
      nav='<button class="continue-btn" onclick="'+(isLast?'renderEnd()':'renderChapter('+(idx+1)+')')+'">'+(isLast?'🏆 Zobacz wyniki!':'➡️ Następny rozdział')+'</button>';
    }
    nav+=(idx>0?'<button class="back-btn" onclick="goBack('+idx+')">← Poprzedni rozdział</button>':'<button class="back-btn" onclick="renderTitle()">← Wybór bohatera</button>');
    bot='<div class="choices"><div class="choice-label">🤔 '+ch.question+'</div>'+chtml+fb+nav+'</div>';
  }
  document.getElementById('slide-container').innerHTML=
    '<div class="comic-panel"><div class="panel-header">'+ch.emoji+' Rozdział '+(idx+1)+': '+ch.title+'</div><div class="panel-scene">'+sc+'</div>'+bot+'</div>';
}

function advScene(idx){
  var steps=chapters[idx].sceneSteps(hero==='adam'?'Adam':'Ewa',heroEmoji);
  if(chapterSceneStep[idx]<steps.length-1) chapterSceneStep[idx]++;
  renderChapter(idx);
}
function goBack(idx){chapterSceneStep[idx-1]=undefined;renderChapter(idx-1);}
function doAnswer(idx,choice){
  if(answers[idx]!==undefined) return;
  answers[idx]=choice;
  var correct=chapters[idx].choices[choice].correct;
  if(correct){portfolio+=50000;score++;earnedBadges[idx]=chapters[idx].badge;}
  else portfolio-=20000;
  renderChapter(idx);
}

function renderEnd(){
  document.getElementById('score-bar').style.display='block';
  document.getElementById('chapter-label').textContent='Wyniki';
  document.getElementById('portfolio-val').textContent=portfolio.toLocaleString('pl-PL')+' zł';
  updateProgress(CHAPTER_COUNT);
  var pct=score/CHAPTER_COUNT, em, ti;
  if(pct>=0.85){em='🏆';ti='Mistrz ETF-ów!';}else if(pct>=0.6){em='🎉';ti='Niezły inwestor!';}else{em='📚';ti='Jest nad czym pracować!';}
  var badges=Object.values(earnedBadges);
  var bhtml=badges.length>0?badges.map(function(b){return'<span class="badge">'+b+'</span>';}).join(''):'<span class="badge">🌱 Uczeń w drodze</span>';
  var zdobyl=hero==='adam'?'Zdobyłeś':'Zdobyłaś';
  document.getElementById('slide-container').innerHTML=
    '<div class="comic-panel"><div class="panel-header">🏆 Koniec przygody!</div>'
    +'<div class="panel-scene" style="text-align:center;padding:1.2rem;">'
    +'<div style="font-size:52px;">'+em+'</div>'
    +'<h2 style="font-size:20px;font-weight:800;color:#1a1a2e;margin:8px 0;">'+ti+'</h2>'
    +'<div style="font-size:14px;color:#333;line-height:1.6;">'+zdobyl+' <strong>'+score+' z '+CHAPTER_COUNT+'</strong> poprawnych odpowiedzi.<br>Portfel końcowy: <strong>'+portfolio.toLocaleString('pl-PL')+' zł</strong>.<br><br>ETF-y to jedno z najlepszych narzędzi dla długoterminowych inwestorów!</div>'
    +'<div style="margin:14px 0;padding:12px;background:#FFD700;border-radius:12px;border:3px solid #1a1a2e;"><div style="font-size:12px;font-weight:700;color:#1a1a2e;">Portfel końcowy</div><div style="font-size:26px;font-weight:900;color:#1a1a2e;">'+portfolio.toLocaleString('pl-PL')+' zł</div></div>'
    +'<div style="display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin:6px 0;">'+bhtml+'</div><div style="margin-top:1rem;padding:1rem;background:#FAEEDA;border:2px solid #EF9F27;border-radius:12px;text-align:center;"><div style="font-size:22px;margin-bottom:6px;">📌</div><div style="font-size:12px;font-weight:700;color:#633806;margin-bottom:6px;letter-spacing:0.5px;text-transform:uppercase;">Pamiętaj o ryzyku</div><div style="font-size:11px;color:#633806;line-height:1.7;text-align:justify;">Inwestowanie wiąże się z ryzykiem, w tym z możliwością utraty części lub całości zainwestowanego kapitału. ETF-y, mimo że są zdywersyfikowanym instrumentem, nie eliminują tego ryzyka. Inwestuj wyłącznie w produkty finansowe, które rozumiesz i które odpowiadają Twojej wiedzy oraz doświadczeniu inwestycyjnemu.</div></div><div style="margin-top:0.6rem;padding:1rem;background:#f8f8f8;border:2px solid #ccc;border-radius:12px;text-align:center;"><div style="font-size:24px;margin-bottom:6px;">⚠️</div><div style="font-size:12px;font-weight:700;color:#1a1a2e;margin-bottom:6px;letter-spacing:0.5px;text-transform:uppercase;">Ważna informacja</div><div style="font-size:14px;color:#666;line-height:1.7;text-align:center;">Niniejszy materiał ma charakter wyłącznie edukacyjny i nie stanowi porady ani rekomendacji inwestycyjnej.</div></div></div>'
    +'<div class="choices"><div class="choice-label">Co teraz?</div>'
    +'<button class="choice-btn" onclick="restart()">🔄 Zagraj jeszcze raz</button>'
    +'<button class="back-btn" onclick="goBack('+CHAPTER_COUNT+')">← Wróć do ostatniego rozdziału</button>'
    +'<button onclick="var s=document.getElementById(\'src-list\');s.style.display=s.style.display===\'none\'?\'block\':\'none\'" style="background:#3B6D11;color:#fff;border:none;border-radius:12px;padding:12px 20px;font-size:15px;font-weight:700;cursor:pointer;width:100%;margin-top:6px;font-family:\'Segoe UI\',sans-serif;">📚 Źródła</button><div id="src-list" style="display:none;margin-top:8px;background:#EAF3DE;border:2px solid #3B6D11;border-radius:10px;padding:10px 14px;"><div style="font-size:12px;font-weight:700;color:#173404;margin-bottom:6px;">Bibliografia:</div><ul style="margin:0;padding-left:16px;font-size:12px;line-height:2;"><li><a href="https://betaetf.pl/jak-dziala-etf" target="_blank" style="color:#185FA5;">betaetf.pl — Jak działa ETF?</a></li><li><a href="https://inwestomat.eu/etf-accumulating-czy-etf-distributing/" target="_blank" style="color:#185FA5;">inwestomat.eu — ETF Accumulating czy Distributing?</a></li><li><a href="https://marciniwuc.com/etfy-akumulujace-vs-dystrybuujace/" target="_blank" style="color:#185FA5;">marciniwuc.com — ETF-y akumulujące vs dystrybuujące</a></li><li><a href="https://www.degiro.pl/wiedza-inwestycyjna/produkty/trackery/roznica-miedzy-akumulacyjnymi-i-dystrybucyjnymi-etf-ami" target="_blank" style="color:#185FA5;">degiro.pl — Różnica między ETF akumulacyjnym i dystrybucyjnym</a></li><li><a href="https://pl.wikipedia.org/wiki/Fundusz_ETF" target="_blank" style="color:#185FA5;">Wikipedia — Fundusz ETF</a></li><li><a href="https://www.analizy.pl/inwestowanie-pasywne/35641/co-to-jest-etf-zasady-dzialania-etf-ow" target="_blank" style="color:#185FA5;">analizy.pl — Co to jest ETF?</a></li><li><a href="https://www.gpw.pl/biblioteka-gpw-wiecej?gpwl_id=21&amp;title=ETF+czyli+kup+sobie+indeks+WIG20" target="_blank" style="color:#185FA5;">gpw.pl — ETF czyli kup sobie indeks WIG20</a></li><li><a href="https://www.bankier.pl/smart/sprawdz-jak-inwestowac-w-etf-poradnik-dla-poczatkujacych" target="_blank" style="color:#185FA5;">bankier.pl — Jak inwestować w ETF?</a></li><li><a href="https://www.xtb.com/pl/edukacja/co-to-jest-dywidenda" target="_blank" style="color:#185FA5;">xtb.com — Co to jest dywidenda?</a></li></ul></div>'
    +'</div></div>';
}

function restart(){
  portfolio=1000000;score=0;answers={};earnedBadges={};chapterSceneStep={};chapterShuffledChoices={};
  renderIntro();
}

renderIntro();
</script>
